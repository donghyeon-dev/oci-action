name: Launch OCI A1 Instance

on:
  schedule:
    # Every 30 minutes. GitHub schedules use UTC.
    # 30m balances A1 capacity polling against OCI retry-token 429 loops
    # and GitHub's tendency to skip very short cron intervals under load.
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: oci-a1-launch
  cancel-in-progress: false

jobs:
  launch:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}

    steps:
      - name: Check existing A1 instance
        id: check
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: >-
            compute instance list
            --compartment-id ${{ secrets.OCI_COMPARTMENT_ID }}
          query: 'data[?shape==''VM.Standard.A1.Flex'' && \"lifecycle-state\"!=''TERMINATED'' && \"lifecycle-state\"!=''TERMINATING''] | length(@)'
          silent: true

      - name: Stop if A1 instance already exists
        if: steps.check.outputs.raw_output != '0' && steps.check.outputs.raw_output != ''
        run: |
          echo "A running A1 instance already exists. Skipping launch."
          curl -fsS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="OCI A1 instance is already running. Disable this workflow if it is no longer needed."

      - name: Disable workflow if A1 instance already exists
        if: steps.check.outputs.raw_output != '0' && steps.check.outputs.raw_output != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow disable launch.yml -R ${{ github.repository }}

      - name: Prepare launch JSON inputs
        if: steps.check.outputs.raw_output == '0' || steps.check.outputs.raw_output == ''
        env:
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          cat > "$RUNNER_TEMP/oci-shape-config.json" <<'JSON'
          {"ocpus":1,"memoryInGBs":6}
          JSON

          raw_ssh_key="$(printf '%s' "$OCI_SSH_PUBLIC_KEY" | tr -d '\r')"
          raw_ssh_key="${raw_ssh_key#\"}"
          raw_ssh_key="${raw_ssh_key%\"}"
          raw_ssh_key="${raw_ssh_key#\'}"
          raw_ssh_key="${raw_ssh_key%\'}"
          ssh_key="$(printf '%s\n' "$raw_ssh_key" | awk 'NF {print $1 " " $2; exit}')"

          if ! printf '%s' "$ssh_key" | grep -Eq '^(ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp(256|384|521)) [A-Za-z0-9+/]+={0,3}$'; then
            echo "::error::OCI_SSH_PUBLIC_KEY must be a single OpenSSH public key, for example: ssh-rsa AAAA..."
            exit 1
          fi

          jq -n --arg ssh_key "$ssh_key" \
            '{ssh_authorized_keys: $ssh_key}' > "$RUNNER_TEMP/oci-metadata.json"

      - name: Try launch A1 instance
        id: launch
        if: steps.check.outputs.raw_output == '0' || steps.check.outputs.raw_output == ''
        continue-on-error: true
        run: |
          set +e
          output="$("$HOME/.local/bin/oci" compute instance launch \
            --availability-domain "${{ secrets.OCI_AVAILABILITY_DOMAIN }}" \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_ID }}" \
            --shape VM.Standard.A1.Flex \
            --shape-config "file://${{ runner.temp }}/oci-shape-config.json" \
            --image-id "${{ secrets.OCI_IMAGE_ID }}" \
            --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
            --display-name dh-server-a1 \
            --assign-public-ip true \
            --metadata "file://${{ runner.temp }}/oci-metadata.json" \
            2>&1)"
          exit_code=$?
          set -e

          printf '%s\n' "$output"
          {
            echo "exit_code=$exit_code"
            echo "output<<OCI_OUTPUT"
            printf '%s\n' "$output"
            echo "OCI_OUTPUT"
          } >> "$GITHUB_OUTPUT"

          exit "$exit_code"

      - name: Notify on launch success
        if: steps.launch.outcome == 'success'
        run: |
          curl -fsS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="OCI A1 instance launched. Check OCI Console and disable any duplicate automation."

      - name: Disable workflow on launch success
        if: steps.launch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow disable launch.yml -R ${{ github.repository }}

      - name: Disable workflow on OCI limit exceeded
        if: contains(steps.launch.outputs.output, 'LimitExceeded')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow disable launch.yml -R ${{ github.repository }}
          curl -fsS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="OCI A1 workflow disabled: LimitExceeded. Check existing OCI resources and quotas."

      - name: Log retryable launch failure
        if: steps.launch.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LAUNCH_OUTPUT: ${{ steps.launch.outputs.output }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "Launch attempt failed. The schedule will retry."

          reason="Unknown launch failure. Check the GitHub Actions log for the OCI ServiceError."

          if printf '%s' "$LAUNCH_OUTPUT" | grep -qi 'Out of host capacity\|capacity'; then
            reason="Out of host capacity. OCI has no available A1 capacity in this AD right now."
          elif printf '%s' "$LAUNCH_OUTPUT" | grep -qi 'TooManyRequests\|Too many requests'; then
            reason="Rate limited by OCI. The next scheduled run will retry."
          elif printf '%s' "$LAUNCH_OUTPUT" | grep -qi 'LimitExceeded'; then
            reason="LimitExceeded. Check existing resources, quotas, and Always Free limits."
          elif printf '%s' "$LAUNCH_OUTPUT" | grep -qi 'Invalid ssh public key'; then
            reason="Invalid OCI_SSH_PUBLIC_KEY. The secret must contain one OpenSSH public key line."
          fi

          message="OCI A1 launch failed.
          Reason: $reason
          Run: $RUN_URL"

          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              --data-urlencode text="$message"
          fi

      - name: Notify on workflow failure before launch
        if: failure() && steps.launch.outcome != 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          message="OCI A1 workflow failed before or outside the launch attempt.
          Reason: check the failed GitHub Actions step.
          Run: $RUN_URL"

          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              --data-urlencode text="$message"
          fi
